# NB/T 47014-2023 表6 等离子弧焊(PAW)因素表
# ★category 为语义键

standard: NB/T 47014-2023
source_table: 表6-PAW
data_status: 阶段2（含语义键category）

factors:
  - id: PAW-E01
    category: process_change
    name: 增加或取消任一焊接方法
    level: essential
  - id: PAW-E02
    category: base_metal_category
    name: 母材类别号变更
    level: essential
  - id: PAW-E03
    category: base_metal_group
    name: 母材组别号变更（超出评定范围）
    level: essential
  - id: PAW-E04
    category: consumable_class
    name: 填充金属类别变更/添加↔不添加
    level: essential
  - id: PAW-E05
    category: gas_type
    name: 保护气体种类变更
    level: essential
  - id: PAW-E06
    category: plasma_gas
    name: 等离子气（离子气）种类变更
    level: essential
    note: PAW特有
  - id: PAW-E07
    category: weld_mode
    name: 焊接模式变更（小孔型↔熔透型）
    level: essential
    note: PAW特有
  - id: PAW-E08
    category: preheat
    name: 预热温度降低（超出评定值50℃以上）
    level: essential
  - id: PAW-E09
    category: pwht
    name: 焊后热处理类别/参数变更
    level: essential
  - id: PAW-E10
    category: current_type
    name: 电源类型（电流种类/极性）变更
    level: essential
  - id: PAW-S01
    category: diameter
    name: 焊丝/填充丝直径增大
    level: supplemental
  - id: PAW-S02
    category: position_vertical
    name: 焊接位置改为向上立焊
    level: supplemental
    invalidate_when:
      - PWHT_is_upper_transformation
      - austenitic_solution_treated
  - id: PAW-S03
    category: multi_to_single_pass
    name: 每面多道焊改为每面单道焊
    level: supplemental
    invalidate_when:
      - PWHT_is_upper_transformation
      - austenitic_solution_treated
  - id: PAW-S04
    category: heat_input
    name: 热输入（线能量）增大（超出评定值）
    level: supplemental
  - id: PAW-N01
    category: groove
    name: 坡口形式/尺寸变更
    level: nonessential
  - id: PAW-N02
    category: tungsten
    name: 钨极直径/型号变更
    level: nonessential
