# NB/T 47014-2023 表6 熔化极气体保护焊(GMAW/FCAW)因素表
# ★category 为语义键

standard: NB/T 47014-2023
source_table: 表6-GMAW
data_status: 阶段2（含语义键category）

factors:
  - id: GMAW-E01
    category: process_change
    name: 增加或取消任一焊接方法
    level: essential
  - id: GMAW-E02
    category: base_metal_category
    name: 母材类别号变更
    level: essential
  - id: GMAW-E03
    category: base_metal_group
    name: 母材组别号变更（超出评定范围）
    level: essential
  - id: GMAW-E04
    category: consumable_class
    name: 焊丝类别号(F号)/熔敷金属化学成分(A号)变更
    level: essential
    note: 含实芯↔药芯切换
  - id: GMAW-E05
    category: gas_type
    name: 保护气体种类及配比变更
    level: essential
  - id: GMAW-E06
    category: preheat
    name: 预热温度降低（超出评定值50℃以上）
    level: essential
  - id: GMAW-E07
    category: preheat_cancel
    name: 取消预热
    level: essential
  - id: GMAW-E08
    category: pwht
    name: 焊后热处理类别/参数变更
    level: essential
  - id: GMAW-E09
    category: current_type
    name: 电源类型（电流种类/极性）变更
    level: essential
    note: ★2023版升级为重要因素
  - id: GMAW-E10
    category: backing
    name: 衬垫增加/取消/材质变更
    level: essential
  - id: GMAW-S01
    category: diameter
    name: 焊丝直径增大
    level: supplemental
  - id: GMAW-S02
    category: position_vertical
    name: 焊接位置改为向上立焊
    level: supplemental
    invalidate_when:
      - PWHT_is_upper_transformation
      - austenitic_solution_treated
  - id: GMAW-S03
    category: multi_to_single_pass
    name: 每面多道焊改为每面单道焊
    level: supplemental
    invalidate_when:
      - PWHT_is_upper_transformation
      - austenitic_solution_treated
  - id: GMAW-S04
    category: heat_input
    name: 热输入（线能量）增大（超出评定值）
    level: supplemental
  - id: GMAW-S05
    category: transfer_mode
    name: 熔滴过渡方式变更（短路/喷射/脉冲）
    level: supplemental
  - id: GMAW-N01
    category: groove
    name: 坡口形式/尺寸变更
    level: nonessential
  - id: GMAW-N02
    category: gas_flow
    name: 保护气体流量变更
    level: nonessential
